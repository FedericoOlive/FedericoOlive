<svg xmlns="http://www.w3.org/2000/svg" width="600" height="505" viewBox="0 0 600 505">
  <style>
    :root {
      --color-frame: #2e7d4f;
      --color-player: #00ff41;
      --color-enemy: #ff5555;
      --color-bullet: #ffd700;
      --color-explosion: #ff6a00;
      --color-message: #ffffff;
      --cycle-duration: 3s;
    }

    .game text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px;
      white-space: pre;
    }

    .game .frame     { fill: var(--color-frame); }
    .game .player    { fill: var(--color-player); }
    .game .enemy     { fill: var(--color-enemy); }
    .game .bullet    { fill: var(--color-bullet); }
    .game .explosion { fill: var(--color-explosion); }

    .game .message {
      fill: var(--color-message);
      font-size: 16px;
      text-anchor: middle;
    }

    .game .message-backdrop { fill: #0d1117; }

    @keyframes shoot {
      0% {
        transform: translateY(0);
        opacity: 1;
        animation-timing-function: steps(37, end);
      }
      70%       { transform: translateY(-370px); opacity: 1; }
      71%, 100% { transform: translateY(-370px); opacity: 0; }
    }

    @keyframes explode {
      0%, 69%   { opacity: 0; }
      70%, 81%  { opacity: 1; }
      82%, 100% { opacity: 0; }
    }

    @keyframes patrol {
      0%, 49%   { transform: translateX(0); }
      50%, 100% { transform: translateX(24px); }
    }

    @keyframes die {
      0%, 69%   { opacity: 1; }
      70%, 100% { opacity: 0; }
    }

    @keyframes announce {
      0%, 81%   { opacity: 0; }
      82%, 100% { opacity: 1; }
    }

    .game .bullet    { animation: shoot var(--cycle-duration) infinite; }
    .game .explosion { opacity: 0; animation: explode var(--cycle-duration) infinite; }
    .game .message,
    .game .message-backdrop { opacity: 0; animation: announce var(--cycle-duration) infinite; }
    .game .enemy {
      animation:
        patrol var(--cycle-duration) infinite,
        die var(--cycle-duration) infinite;
    }
  </style>

  <g class="game">
